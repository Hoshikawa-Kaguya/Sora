name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/**'

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # NBGV requires full git history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install NBGV
        uses: dotnet/nbgv@master
        id: nbgv

      - name: Restore
        run: dotnet restore Sora.slnx

      - name: Build
        run: dotnet build Sora.slnx -c Release --no-restore

      - name: Unit Test
        run: dotnet test Sora.slnx -c Release --filter "Category=Unit" --no-build

      - name: Pack
        run: dotnet pack Sora.slnx -c Release --no-build -o ./nupkg

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkg/*
          retention-days: 30
