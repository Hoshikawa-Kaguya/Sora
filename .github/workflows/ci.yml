name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      pkg-sora-core:
        description: 'Publish Sora.Core'
        type: boolean
        default: true
      pkg-sora-entities:
        description: 'Publish Sora.Entities'
        type: boolean
        default: true
      pkg-sora-command:
        description: 'Publish Sora.Command'
        type: boolean
        default: true
      pkg-sora:
        description: 'Publish Sora (facade)'
        type: boolean
        default: true
      pkg-sora-adapter-milky:
        description: 'Publish Sora.Adapter.Milky'
        type: boolean
        default: true
      pkg-sora-adapter-onebot11:
        description: 'Publish Sora.Adapter.OneBot11'
        type: boolean
        default: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # NBGV requires full git history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install NBGV
        uses: dotnet/nbgv@master
        id: nbgv

      - name: Restore
        run: dotnet restore Sora.slnx

      - name: Build
        run: dotnet build Sora.slnx -c Release --no-restore

      - name: Unit Test
        run: dotnet test Sora.slnx -c Release --filter "Category=Unit" --no-build

      - name: Pack
        run: dotnet pack Sora.slnx -c Release --no-build -o ./nupkg

      - name: Filter changed packages
        id: filter
        run: |
          mkdir -p ./filtered

          # Manual dispatch → select packages based on boolean inputs
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual dispatch, selecting packages from inputs"

            declare -a SELECTIONS=(
              "${{ inputs.pkg-sora-core }}:^HoshikawaKaguya\.Sora\.Core\."
              "${{ inputs.pkg-sora-entities }}:^HoshikawaKaguya\.Sora\.Entities\."
              "${{ inputs.pkg-sora-command }}:^HoshikawaKaguya\.Sora\.Command\."
              "${{ inputs.pkg-sora }}:^HoshikawaKaguya\.Sora\.[0-9]+\."
              "${{ inputs.pkg-sora-adapter-milky }}:^HoshikawaKaguya\.Sora\.Adapter\.Milky\."
              "${{ inputs.pkg-sora-adapter-onebot11 }}:^HoshikawaKaguya\.Sora\.Adapter\.OneBot11\."
            )

            FOUND=false
            for entry in "${SELECTIONS[@]}"; do
              enabled="${entry%%:*}"
              pattern="${entry#*:}"
              if [ "$enabled" == "true" ]; then
                for pkg in ./nupkg/*; do
                  basename=$(basename "$pkg")
                  if echo "$basename" | grep -qE "${pattern}"; then
                    cp "$pkg" ./filtered/
                    FOUND=true
                  fi
                done
              fi
            done

            if [ "$FOUND" == "true" ]; then
              echo "has-packages=true" >> "$GITHUB_OUTPUT"
            else
              echo "has-packages=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # Determine base commit for diff
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE=$(git merge-base "${{ github.event.pull_request.base.sha }}" HEAD)
          else
            BASE="${{ github.event.before }}"
          fi

          # New branch or unable to diff → upload all packages
          if [ "$BASE" == "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            echo "New branch detected, uploading all packages"
            cp ./nupkg/*.nupkg ./filtered/ 2>/dev/null || true
            cp ./nupkg/*.snupkg ./filtered/ 2>/dev/null || true
            echo "has-packages=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE" HEAD)

          # Shared build config changed → all packages affected
          if echo "$CHANGED_FILES" | grep -qE "^(Directory\.Build\.props|Directory\.Packages\.props)$"; then
            echo "Shared build config changed, uploading all packages"
            cp ./nupkg/*.nupkg ./filtered/ 2>/dev/null || true
            cp ./nupkg/*.snupkg ./filtered/ 2>/dev/null || true
            echo "has-packages=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Map src directories to package name regex patterns
          declare -A PROJECT_MAP=(
            ["src/Sora.Core/"]="^HoshikawaKaguya\.Sora\.Core\."
            ["src/Sora.Entities/"]="^HoshikawaKaguya\.Sora\.Entities\."
            ["src/Sora.Command/"]="^HoshikawaKaguya\.Sora\.Command\."
            ["src/Sora/"]="^HoshikawaKaguya\.Sora\.[0-9]+\."
            ["src/Sora.Adapter.Milky/"]="^HoshikawaKaguya\.Sora\.Adapter\.Milky\."
            ["src/Sora.Adapter.OneBot11/"]="^HoshikawaKaguya\.Sora\.Adapter\.OneBot11\."
          )

          FOUND=false
          for dir in "${!PROJECT_MAP[@]}"; do
            if echo "$CHANGED_FILES" | grep -qF "$dir"; then
              pattern="${PROJECT_MAP[$dir]}"
              for pkg in ./nupkg/*; do
                basename=$(basename "$pkg")
                if echo "$basename" | grep -qE "${pattern}"; then
                  cp "$pkg" ./filtered/
                  FOUND=true
                fi
              done
            fi
          done

          if [ "$FOUND" == "true" ]; then
            echo "has-packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-packages=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload NuGet packages
        if: >-
          steps.filter.outputs.has-packages == 'true' &&
          (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./filtered/*
          retention-days: 30
